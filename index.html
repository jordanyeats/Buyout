<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

/* BUYOUT â Paper + Ink Edition
   Warm parchment base, dark ink typography, jewel-tone companies.
   Premium editorial feel. Full v1.4 engine. */

// Constants
const R=9,C=9,SAFE=25,ENDSZ=35,CASH0=100000,HAND=4,MBUY=3,FBLK=2,PB=5000,PR=1.15,CAP=100000,MJ=10,MN=5,CF=3,CT=2,BPR=1000;
const SPC={2:15,3:18,4:20,5:23,6:25};
const COS=[
  {n:"Blink",cd:"BL",bg:"#0E6E7C",tx:"#C4E8ED",pill:"#E6F4F6",ptx:"#0A5560"},
  {n:"Zap",cd:"ZP",bg:"#8B6914",tx:"#F5E6C0",pill:"#FBF3E0",ptx:"#6B4F0E"},
  {n:"Flux",cd:"FX",bg:"#7B2D8E",tx:"#E8CFF0",pill:"#F4E8F8",ptx:"#5C1D6C"},
  {n:"Spark",cd:"SK",bg:"#9B2335",tx:"#F5CDD3",pill:"#FAE6E9",ptx:"#7A1A2A"},
  {n:"Neon",cd:"NE",bg:"#1B6B3A",tx:"#C5E8D3",pill:"#E4F5EB",ptx:"#14522D"},
  {n:"Pogo",cd:"PG",bg:"#3D3D99",tx:"#CDCDF5",pill:"#EAEAFB",ptx:"#2D2D75"},
];
const gci=n=>COS.find(c=>c.n===n)||{n,cd:"??",bg:"#777",tx:"#EEE",pill:"#F0F0F0",ptx:"#555"};
const sp=s=>{if(s<2)return 0;return Math.min(CAP,Math.round(PB*Math.pow(PR,s)/100)*100);};
const $$=n=>"$"+n.toLocaleString();
const xy=(r,c)=>String.fromCharCode(65+c)+(r+1);
// Grammar: "You buy" vs "Stratton buys"
const isYou=p=>p.tp==="human";
const pn=p=>isYou(p)?"You":p.nm; // display name
const pv=(p,v3,v2)=>isYou(p)?v2:v3; // verb: 3rd person / 2nd person
function mkR(a){return()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuf(a,r){for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function dc(o){return JSON.parse(JSON.stringify(o));}

// Inject CSS
if(typeof document!=='undefined'){const s=document.createElement('style');s.textContent=`
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500;600;700;800&display=swap');
@keyframes boPop{0%{transform:scale(0.85);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

@keyframes boFade{0%{opacity:0}100%{opacity:1}}
@keyframes boCard{0%{transform:perspective(600px) rotateY(80deg) scale(0.9);opacity:0}60%{transform:perspective(600px) rotateY(-3deg) scale(1.01)}100%{transform:perspective(600px) rotateY(0) scale(1);opacity:1}}
@keyframes boPulse{0%,100%{opacity:1}50%{opacity:0.4}}
.boPop{animation:boPop .35s cubic-bezier(.34,1.56,.64,1) both}
.boSlide{animation:boSlide .3s ease both}
.boFade{animation:boFade .25s ease both}
.boCard{animation:boCard .5s cubic-bezier(.34,1.56,.64,1) both}
.boPulse{animation:boPulse 1.6s ease infinite}
`;document.head.appendChild(s);}

// Theme
const BG="#FAF6F0",CARD="#FFFFFF",INK="#1A1715",INK2="#6B6560",INK3="#9E9790",BD="#E8E2DA",BD2="#D4CEC4",ACCENT="#8B6914",GRN="#1B6B3A",RED="#9B2335",PUR="#3D3D99",WARM="#F5F0E8";
const hd="'Playfair Display',Georgia,serif";
const bd="'Source Sans 3',-apple-system,'Helvetica Neue',sans-serif";

// Cards
const CARDS=[
  {id:"regulatory",cat:"blocker",name:"Regulatory Review",desc:"Merger delayed one round.",flav:"The FTC has questions.",dev:false},
  {id:"antitrust",cat:"blocker",name:"Antitrust Ruling",desc:"Survivor releases 3 blocks to market.",flav:"Approved with conditions.",dev:false},
  {id:"blocked",cat:"blocker",name:"Takeover Blocked",desc:"Merger CANCELLED. Turn ends immediately.",flav:"The board has voted no.",dev:true},
  {id:"duedil",cat:"blocker",name:"Due Diligence Failure",desc:"Defunct valued at HALF for sell/convert.",flav:"Irregularities discovered.",dev:false},
  {id:"vc",cat:"windfall",name:"VC Injection",desc:"Every player receives $25,000.",flav:"Capital flows into the sector.",dev:false},
  {id:"ipo",cat:"windfall",name:"IPO Bonus",desc:"You receive defunct price x3 in cash.",flav:"Markets reward the dealmaker.",dev:false},
  {id:"tax",cat:"windfall",name:"Liquidation Tax",desc:"30% tax on all sell proceeds this merger.",flav:"Emergency legislation.",dev:true},
  {id:"golden",cat:"windfall",name:"Golden Parachute",desc:"Founder gets 2 free survivor blocks.",flav:"Protection was negotiated.",dev:false},
  {id:"earnings",cat:"market",name:"Earnings Miss",desc:"Pick a company - it loses 3 tiles.",flav:"Quarterly results disappoint.",dev:false},
  {id:"partner",cat:"market",name:"Strategic Partnership",desc:"Two smallest companies ally up.",flav:"A strategic alliance.",dev:false},
  {id:"valreset",cat:"market",name:"Valuation Reset",desc:"A company's price drops permanently.",flav:"Analysts downgrade.",dev:false},
  {id:"secondary",cat:"market",name:"Secondary Offering",desc:"4 new blocks added to a company.",flav:"New shares issued.",dev:false},
  {id:"talent",cat:"hostile",name:"Talent Raid",desc:"Opponent sells 1 block of shared company.",flav:"Key people poached.",dev:false},
  {id:"activist",cat:"hostile",name:"Activist Campaign",desc:"Majority pays $15K or gives you 1 block.",flav:"An activist demands change.",dev:false},
  {id:"earnout",cat:"hostile",name:"Earnout Agreement",desc:"If survivor hits size 20, you get $50K.",flav:"Performance milestones.",dev:false},
];
function buildDeck(rng){const d=[...CARDS];const fs=["Deal closes smoothly.","Investors respond well.","Textbook acquisition."];for(let i=0;i<12;i++)d.push({id:"clean",cat:"clean",name:"Clean Acquisition",desc:"Normal merger. You get $5,000.",flav:fs[i%3],dev:false});shuf(d,rng);return d;}

// ââ Engine (same as v1.4) ââ
const adj=(r,c)=>[[-1,0],[1,0],[0,-1],[0,1]].map(([dr,dc2])=>[r+dr,c+dc2]).filter(([nr,nc])=>nr>=0&&nr<R&&nc>=0&&nc<C);
const adjCo=(b,r,c)=>{const s=new Set();for(const[nr,nc]of adj(r,c)){const t=b[nr][nc];if(t&&t!=="e")s.add(t);}return[...s];};
const adjUn=(b,r,c)=>adj(r,c).filter(([nr,nc])=>b[nr][nc]==="e");
function connUn(b,r,c){const v=new Set(),q=[[r,c]];while(q.length){const[cr,cc]=q.shift();const k=cr+","+cc;if(v.has(k))continue;if(b[cr][cc]!=="e")continue;v.add(k);for(const[nr,nc]of adj(cr,cc))if(!v.has(nr+","+nc))q.push([nr,nc]);}return[...v].map(k=>k.split(",").map(Number));}
const coT=(b,n)=>{const t=[];for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(b[r][c]===n)t.push([r,c]);return t;};
function analyze(b,cos,r,c){const ac=adjCo(b,r,c),au=adjUn(b,r,c);if(ac.length>=2){const sf=ac.filter(n=>cos[n].st==="safe"),ns=ac.filter(n=>cos[n].st!=="safe");if(sf.length>=2&&ns.length===0)return{type:"x"};if(sf.length>=2)return{type:"expand",co:sf.sort((a,b2)=>cos[b2].sz-cos[a].sz)[0]};return{type:"merger",cos:ac};}if(ac.length===1)return{type:"expand",co:ac[0]};if(au.length>0&&Object.values(cos).some(c2=>c2.st==="inactive")){const conn=new Set();conn.add(r+","+c);for(const[ar,ac2]of au)for(const t of connUn(b,ar,ac2))conn.add(t.join(","));return{type:"found",conn:[...conn].map(k=>k.split(",").map(Number))};}return{type:"none"};}
const canPlay=(b,cos,r,c)=>analyze(b,cos,r,c).type!=="x";
function mm(cn,ps){const h=ps.map(p=>({p,s:p.sh[cn]||0})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);if(!h.length)return{maj:[],min:[]};const ms=h[0].s;return{maj:h.filter(x=>x.s===ms).map(x=>x.p),min:(()=>{const r2=h.filter(x=>x.s<ms);return r2.length?r2.filter(x=>x.s===r2[0].s).map(x=>x.p):[];})()};}
function payB(co,ps,logs){const pr=sp(co.sz),mb=pr*MJ,nb=pr*MN;const{maj,min}=mm(co.n,ps);if(!maj.length)return;if(maj.length===1&&min.length===0){maj[0].ca+=mb+nb;logs.push(pn(maj[0])+" "+pv(maj[0],"receives","receive")+" "+$$(mb+nb)+" for "+co.n);}else if(maj.length===1){maj[0].ca+=mb;logs.push(pn(maj[0])+" "+pv(maj[0],"receives","receive")+" "+$$(mb)+" majority for "+co.n);const s=Math.floor(nb/min.length);for(const p of min){p.ca+=s;logs.push(pn(p)+" "+pv(p,"receives","receive")+" "+$$(s)+" minority for "+co.n);}}else{const s=Math.floor((mb+nb)/maj.length);for(const p of maj){p.ca+=s;logs.push(pn(p)+" "+pv(p,"receives","receive")+" "+$$(s)+" split for "+co.n);}}}

function newGame(cfgs,seed,useCards){const rng2=mkR(seed),n=cfgs.length,mx=SPC[n]||20;const pool=[];for(let i=0;i<R;i++)for(let j=0;j<C;j++)pool.push([i,j]);shuf(pool,rng2);const ps=cfgs.map(({name,type})=>({nm:name,tp:type,ca:CASH0,sh:{},hd:[]}));for(const p of ps)for(let i=0;i<HAND&&pool.length;i++)p.hd.push(pool.pop());const cos={},mkt={};for(const c of COS){cos[c.n]={n:c.n,st:"inactive",sz:0};mkt[c.n]=mx;}const deck=useCards?buildDeck(mkR(seed+7777)):[];return{bd:Array.from({length:R},()=>Array(C).fill(null)),cos,mkt,ps,pool,mx,ci2:0,turn:0,ph:"place",over:false,logs:[],seed,useCards,pRes:null,pTile:null,mq:null,endT:false,popup:null,mdpi:null,mdec:null,deck,discard:[],founders:{},valR:{},earnouts:[],partner:null,taxActive:false,halfPrice:false,cardForMerger:null};}

// AI
function aiTile(g,idx){const p=g.ps[idx],tiles=p.hd.filter(([r,c])=>canPlay(g.bd,g.cos,r,c));if(!tiles.length)return null;if(p.tp==="random")return tiles[Math.floor(Math.random()*tiles.length)];let best=tiles[0],bs=-Infinity;for(const t of tiles){const res=analyze(g.bd,g.cos,t[0],t[1]);let s=Math.random()*2;if(res.type==="found")s+=40;else if(res.type==="expand"){const my=p.sh[res.co]||0,{maj}=mm(res.co,g.ps);if(my===0)s-=5;else if(maj.some(m=>m.nm===p.nm))s+=g.cos[res.co].sz>=SAFE-3?45:20+my*2;else s+=2;}else if(res.type==="merger"){const sizes={};for(const n2 of res.cos)sizes[n2]=g.cos[n2].sz;const surv=res.cos.reduce((a,b2)=>sizes[a]>=sizes[b2]?a:b2);let ms2=5;for(const dn of res.cos.filter(n2=>n2!==surv)){const{maj}=mm(dn,g.ps);if(maj.some(m=>m.nm===p.nm))ms2+=30;else if(maj.length&&!maj.some(m=>m.nm===p.nm))ms2-=12;}if((p.sh[surv]||0)>0)ms2+=(p.sh[surv]||0)*3;s+=ms2;}if(s>bs){bs=s;best=t;}}return best;}
function aiBuy(g,idx){const p=g.ps[idx];const buyable=Object.values(g.cos).filter(c=>(c.st==="active"||c.st==="safe")&&g.mkt[c.n]>0).map(c=>({n:c.n,pr:sp(c.sz),av:g.mkt[c.n],sz:c.sz})).filter(c=>c.pr>0&&c.pr<=p.ca);if(!buyable.length)return{};if(p.tp==="random"){const res={};let rem=Math.floor(Math.random()*(MBUY+1)),cash=p.ca;for(let i=0;i<rem;i++){const pk=buyable[Math.floor(Math.random()*buyable.length)];if(pk.pr>cash||(res[pk.n]||0)>=pk.av)continue;res[pk.n]=(res[pk.n]||0)+1;cash-=pk.pr;}return res;}const budget=p.tp==="strategic"?p.ca*0.8:p.ca;const scored=buyable.map(c=>{let s=0;const my=p.sh[c.n]||0;const{maj}=mm(c.n,g.ps);if(p.tp==="strategic"){if(maj.some(m=>m.nm===p.nm))s+=20;else if(my>0&&maj.length){const gap=(maj[0].sh[c.n]||0)-my;if(gap<=2)s+=28;else if(gap>4)s-=10;}if(!maj.length&&my===0)s+=15;if(my>0&&!maj.length)s+=18;if(c.sz<=5)s+=8;}else{s=c.sz*5;if(my>0)s+=10;}return{...c,s:s+Math.random()*3};}).sort((a,b)=>b.s-a.s);const res={};let rem=MBUY,cash=budget;for(const c of scored){if(rem<=0)break;const can=c.pr>0?Math.min(rem,c.av,Math.floor(cash/c.pr)):0;if(can>0){res[c.n]=can;cash-=can*c.pr;rem-=can;}}return res;}
function aiMerger(g,p,dn,sn,held){const avail=g.mkt[sn]||0;const dp=g.halfPrice?Math.floor(sp(g.cos[dn].sz)/2):sp(g.cos[dn].sz);const survP=sp(g.cos[sn].sz);if(p.tp==="random"){if(avail===0){const sell=Math.floor(Math.random()*(held+1));return{sell,convert:0,hold:held-sell};}const sell=Math.floor(Math.random()*(held+1)),rem=held-sell,mc=Math.floor(rem/CF)*CF,conv=mc>0?Math.floor(Math.random()*(mc/CF+1))*CF:0;return{sell,convert:Math.min(conv,rem),hold:held-sell-Math.min(conv,rem)};}if(p.tp==="greedy")return{sell:held,convert:0,hold:0};if(avail===0)return{sell:held,convert:0,hold:0};const maxSets=Math.floor(held/CF),wouldGain=Math.min(maxSets*CT,avail),actSets=wouldGain>0?Math.floor(wouldGain/CT):0,convSh=actSets*CF,rem=held-convSh;const cvVal=CT*survP,slVal=CF*dp;let shouldConv=cvVal>=slVal;if(!shouldConv){const{maj}=mm(sn,g.ps);if(maj.length&&!maj.some(m=>m.nm===p.nm)&&(p.sh[sn]||0)+wouldGain>=(maj[0].sh[sn]||0))shouldConv=true;}if(shouldConv&&convSh>0)return{sell:rem,convert:convSh,hold:0};return{sell:held,convert:0,hold:0};}

// State transitions
function doPlace(gs,tile){const g=dc(gs),[r,c]=tile,p=g.ps[g.ci2];p.hd=p.hd.filter(([hr,hc])=>hr!==r||hc!==c);g.bd[r][c]="e";const res=analyze(g.bd,g.cos,r,c);g.pRes=res;g.pTile=tile;if(res.type==="none"){g.ph="buy";g.logs.push(pn(p)+" placed at "+xy(r,c));}else if(res.type==="expand"){g.bd[r][c]=res.co;for(const[ar,ac2]of adjUn(g.bd,r,c))for(const[tr,tc]of connUn(g.bd,ar,ac2))g.bd[tr][tc]=res.co;const ns=coT(g.bd,res.co).length;g.cos[res.co].sz=ns;if(ns>=SAFE&&g.cos[res.co].st==="active")g.cos[res.co].st="safe";if(ns>=ENDSZ)g.endT=true;chkE(g);g.ph="buy";g.logs.push(res.co+" expands to "+ns);}else if(res.type==="found"){g.ph="found";g.logs.push(pn(p)+" "+(isYou(p)?"found":"founds")+" a company");}else if(res.type==="merger"){const sizes={};for(const n2 of res.cos)sizes[n2]=g.cos[n2].sz;const mx2=Math.max(...Object.values(sizes)),tied=Object.keys(sizes).filter(n2=>sizes[n2]===mx2);if(tied.length===1){const surv=tied[0],defunct=res.cos.filter(n2=>n2!==surv).sort((a,b2)=>g.cos[b2].sz-g.cos[a].sz);g.mq={surv,defunct,di:0};g.bd[r][c]=surv;for(const[ar,ac2]of adjUn(g.bd,r,c))for(const[tr,tc]of connUn(g.bd,ar,ac2))g.bd[tr][tc]=surv;const card=drw(g);g.popup={type:"announce",surv,defunct:[...defunct],by:pn(p),card};g.ph="popup";g.logs.push("Merger: "+surv+" acquires "+defunct.join(", "));}else{g.mq={tied,all:res.cos};g.ph="merger_survivor";g.logs.push("Merger tie: "+tied.join(", "));}}return g;}
function drw(g){if(!g.useCards||g.deck.length===0)return null;const card=g.deck.shift();g.discard.push(card);return card;}
function doFound(gs,cn){const g=dc(gs),[r,c]=g.pTile,p=g.ps[g.ci2],res=g.pRes;for(const[tr,tc]of res.conn)g.bd[tr][tc]=cn;g.bd[r][c]=cn;const sz=coT(g.bd,cn).length;g.cos[cn].st="active";g.cos[cn].sz=sz;if(sz>=SAFE)g.cos[cn].st="safe";if(sz>=ENDSZ)g.endT=true;const gr=Math.min(FBLK,g.mkt[cn]);p.sh[cn]=(p.sh[cn]||0)+gr;g.mkt[cn]-=gr;g.founders[cn]=p.nm;g.ph="buy";g.logs.push(pn(p)+" "+(isYou(p)?"found":"founds")+" "+cn+" - "+gr+" free blocks");return g;}
function doSurv(gs,sn){const g=dc(gs),[r,c]=g.pTile,p=g.ps[g.ci2];const defunct=g.mq.all.filter(n2=>n2!==sn).sort((a,b2)=>g.cos[b2].sz-g.cos[a].sz);g.mq={surv:sn,defunct,di:0};g.bd[r][c]=sn;for(const[ar,ac2]of adjUn(g.bd,r,c))for(const[tr,tc]of connUn(g.bd,ar,ac2))g.bd[tr][tc]=sn;const card=drw(g);g.popup={type:"announce",surv:sn,defunct:[...defunct],by:pn(p),card};g.ph="popup";return g;}
function appCard(g,card,ti){if(!card)return"proceed";const p=g.ps[ti];if(card.id==="clean"){p.ca+=5000;return"proceed";}if(card.id==="blocked")return"cancel";if(card.id==="vc"){for(const pl of g.ps)pl.ca+=25000;return"proceed";}if(card.id==="ipo"){const dn=g.mq.defunct[g.mq.di];const dnN=typeof dn==="string"?dn:dn.n||dn;p.ca+=sp(g.cos[dnN].sz)*3;return"proceed";}if(card.id==="tax"){g.taxActive=true;return"proceed";}if(card.id==="duedil"){g.halfPrice=true;return"proceed";}if(card.id==="earnings"){const mcos=g.mq?[g.mq.surv,...(g.mq.defunct||[]).map(d=>typeof d==="string"?d:d.n)]:[];const active=Object.values(g.cos).filter(c2=>(c2.st==="active"||c2.st==="safe")&&!mcos.includes(c2.n)&&c2.sz>4);if(active.length){const target=active.reduce((a,b2)=>(p.sh[a.n]||0)<=(p.sh[b2.n]||0)?a:b2);const tiles=coT(g.bd,target.n),removable=Math.min(3,Math.max(0,tiles.length-2));if(removable>0){const edges=tiles.filter(([tr,tc])=>adj(tr,tc).some(([nr,nc])=>g.bd[nr][nc]!==target.n));for(let i=0;i<removable&&i<edges.length;i++)g.bd[edges[i][0]][edges[i][1]]="e";target.sz=Math.max(2,coT(g.bd,target.n).length);}}return"proceed";}if(card.id==="partner"){const sorted=Object.values(g.cos).filter(c2=>c2.st==="active"||c2.st==="safe").sort((a,b2)=>a.sz-b2.sz);if(sorted.length>=2)g.partner=[sorted[0].n,sorted[1].n];return"proceed";}if(card.id==="valreset"){const mcos=g.mq?[g.mq.surv,...(g.mq.defunct||[]).map(d=>typeof d==="string"?d:d.n)]:[];const active=Object.values(g.cos).filter(c2=>(c2.st==="active"||c2.st==="safe")&&!mcos.includes(c2.n));if(active.length){const t2=active.reduce((a,b2)=>(p.sh[a.n]||0)<=(p.sh[b2.n]||0)?a:b2);g.valR[t2.n]=(g.valR[t2.n]||0)-3;}return"proceed";}if(card.id==="secondary"){const active=Object.values(g.cos).filter(c2=>c2.st==="active"||c2.st==="safe");if(active.length){const t2=active.reduce((a,b2)=>(p.sh[a.n]||0)>=(p.sh[b2.n]||0)?a:b2);g.mkt[t2.n]=(g.mkt[t2.n]||0)+4;}return"proceed";}if(card.id==="talent"){for(const co of Object.values(g.cos).filter(c2=>c2.st==="active"||c2.st==="safe")){if((p.sh[co.n]||0)>0){for(const p2 of g.ps){if(p2.nm!==p.nm&&(p2.sh[co.n]||0)>0){p2.sh[co.n]-=1;if(p2.sh[co.n]<=0)delete p2.sh[co.n];p2.ca+=sp(co.sz);g.mkt[co.n]=(g.mkt[co.n]||0)+1;g.logs.push(pn(p2)+" sold 1 "+co.n+" block (talent raid)");return"proceed";}}}}return"proceed";}if(card.id==="activist"){const active=Object.values(g.cos).filter(c2=>c2.st==="active"||c2.st==="safe");if(active.length){const t2=active.reduce((a,b2)=>b2.sz>a.sz?b2:a);const{maj}=mm(t2.n,g.ps);if(maj.length&&maj[0].nm!==p.nm){if(maj[0].ca>50000)maj[0].ca-=15000;else if((maj[0].sh[t2.n]||0)>0){maj[0].sh[t2.n]-=1;if(maj[0].sh[t2.n]<=0)delete maj[0].sh[t2.n];p.sh[t2.n]=(p.sh[t2.n]||0)+1;}}}return"proceed";}if(card.id==="earnout"){g.earnouts.push({player:p.nm,company:g.mq.surv});return"proceed";}return"proceed";}
function chkE(g){const triggered=[];for(const e of g.earnouts){const co=g.cos[e.company];if(co&&(co.st==="active"||co.st==="safe")&&co.sz>=20){const p=g.ps.find(pl=>pl.nm===e.player);if(p){p.ca+=50000;g.logs.push(pn(p)+" "+(isYou(p)?"earn":"earns")+" $50,000 (earnout)");}triggered.push(e);}}for(const e of triggered)g.earnouts=g.earnouts.filter(x=>x!==e);}
function startDec(gs){const g=dc(gs),dn=g.mq.defunct[g.mq.di];const dnN=typeof dn==="string"?dn:dn.n||dn;payB(g.cos[dnN],g.ps,g.logs);g.mdec={};g.popup=null;const order=decOrd(g);const first=order.find(idx=>(g.ps[idx].sh[dnN]||0)>0);if(first!==undefined){g.mdpi=first;g.ph="merger_decide";}else return finDef(g);return g;}
function decOrd(g){const o=[];for(let i=0;i<g.ps.length;i++)o.push((g.ci2+i)%g.ps.length);return o;}
function subDec(gs,pidx,dec2){const g=dc(gs),dn=g.mq.defunct[g.mq.di];const dnN=typeof dn==="string"?dn:dn.n||dn;g.mdec[g.ps[pidx].nm]=dec2;const order=decOrd(g),curOi=order.indexOf(pidx);let next=null;for(let i=curOi+1;i<order.length;i++){const idx=order[i];if((g.ps[idx].sh[dnN]||0)>0&&!g.mdec[g.ps[idx].nm]){next=idx;break;}}if(next!==null){g.mdpi=next;g.ph="merger_decide";}else return exDec(g);return g;}
function exDec(gs){const g=dc(gs),mq=g.mq,dn=mq.defunct[mq.di];const dnN=typeof dn==="string"?dn:dn.n||dn;const def=g.cos[dnN],sn=mq.surv;const price=g.halfPrice?Math.floor(sp(def.sz)/2):sp(def.sz);const details=[];for(const p of g.ps){const d=g.mdec[p.nm];if(!d)continue;if(d.sell>0){let proceeds=d.sell*price;if(g.taxActive){const tax=Math.floor(proceeds*0.3);proceeds-=tax;details.push(pn(p)+" taxed "+$$(tax));}p.sh[dnN]=(p.sh[dnN]||0)-d.sell;if(p.sh[dnN]<=0)delete p.sh[dnN];p.ca+=proceeds;g.mkt[dnN]=(g.mkt[dnN]||0)+d.sell;details.push(pn(p)+" sold "+d.sell+" for "+$$(proceeds));}if(d.convert>0){const sets=Math.floor(d.convert/CF),gaining=Math.min(sets*CT,g.mkt[sn]||0),used=Math.floor(gaining/CT)*CF;p.sh[dnN]=(p.sh[dnN]||0)-used;if(p.sh[dnN]<=0)delete p.sh[dnN];g.mkt[dnN]=(g.mkt[dnN]||0)+used;p.sh[sn]=(p.sh[sn]||0)+gaining;g.mkt[sn]-=gaining;details.push(pn(p)+" converted "+used+" to "+gaining+" "+sn);}if(d.hold>0)details.push(pn(p)+" held "+d.hold);}for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(g.bd[r][c]===dnN)g.bd[r][c]=sn;def.st="inactive";def.sz=0;const ns=coT(g.bd,sn).length;g.cos[sn].sz=ns;if(ns>=SAFE&&g.cos[sn].st==="active")g.cos[sn].st="safe";if(ns>=ENDSZ)g.endT=true;const card=g.cardForMerger;if(card&&card.id==="antitrust"){g.mkt[sn]=(g.mkt[sn]||0)+3;details.push("3 blocks released");}if(card&&card.id==="golden"){const founder=g.founders[dnN];if(founder){const fp=g.ps.find(pl=>pl.nm===founder);const av=g.mkt[sn]||0,gr=Math.min(2,av);if(fp&&gr>0){fp.sh[sn]=(fp.sh[sn]||0)+gr;g.mkt[sn]-=gr;details.push(founder+" got "+gr+" blocks (golden parachute)");}}}chkE(g);g.logs.push(sn+" is now size "+ns);g.popup={type:"result",surv:sn,defunct:dnN,newSz:ns,details};g.ph="popup_result";g.mdpi=null;g.mdec=null;g.taxActive=false;g.halfPrice=false;return g;}
function finDef(gs){const g=dc(gs),mq=g.mq,dn=mq.defunct[mq.di];const dnN=typeof dn==="string"?dn:dn.n||dn;const def=g.cos[dnN],sn=mq.surv;for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(g.bd[r][c]===dnN)g.bd[r][c]=sn;def.st="inactive";def.sz=0;const ns=coT(g.bd,sn).length;g.cos[sn].sz=ns;if(ns>=SAFE&&g.cos[sn].st==="active")g.cos[sn].st="safe";if(ns>=ENDSZ)g.endT=true;g.popup={type:"result",surv:sn,defunct:dnN,newSz:ns,details:["No shareholders"]};g.ph="popup_result";g.mdpi=null;g.mdec=null;g.taxActive=false;g.halfPrice=false;return g;}
function advM(gs){const g=dc(gs);g.popup=null;g.mq.di++;if(g.mq.di<g.mq.defunct.length){const dn=g.mq.defunct[g.mq.di];g.popup={type:"announce",surv:g.mq.surv,defunct:[dn],by:"continuing",card:null};g.ph="popup";}else{g.mq=null;g.cardForMerger=null;g.ph="buy";}return g;}
function doBuy(gs,purchases){const g=dc(gs),p=g.ps[g.ci2];for(const[n2,cnt]of Object.entries(purchases)){if(cnt<=0)continue;const pr=sp(g.cos[n2].sz)*cnt;p.ca-=pr;p.sh[n2]=(p.sh[n2]||0)+cnt;g.mkt[n2]-=cnt;g.logs.push(pn(p)+" "+(isYou(p)?"buy":"buys")+" "+cnt+" "+n2);}return g;}
function doEnd(gs){const g=dc(gs),p=g.ps[g.ci2];while(p.hd.length<HAND&&g.pool.length)p.hd.push(g.pool.pop());if(g.endT){g.over=true;g.ph="gameover";return g;}g.turn++;g.ci2=g.turn%g.ps.length;g.ph="place";g.pRes=null;g.pTile=null;const np=g.ps[g.ci2],pl=np.hd.filter(([r,c])=>canPlay(g.bd,g.cos,r,c));if(pl.length===0&&np.hd.length>0){for(const t of np.hd)g.pool.push(t);np.hd=[];shuf(g.pool,mkR(g.seed+g.turn));while(np.hd.length<HAND&&g.pool.length)np.hd.push(g.pool.pop());}return g;}
function doFinal(gs){const g=dc(gs);g.logs.push("--- Final Scoring ---");for(const c of Object.values(g.cos).filter(c2=>c2.st==="active"||c2.st==="safe"))payB(c,g.ps,g.logs);for(const p of g.ps){for(const[n2,cnt]of Object.entries(p.sh)){const c2=g.cos[n2];if(c2.st==="active"||c2.st==="safe"){const pr=cnt*sp(c2.sz);p.ca+=pr;g.logs.push(pn(p)+" "+(isYou(p)?"liquidate":"liquidates")+" "+cnt+" "+n2+" for "+$$(pr));}}p.sh={};}return g;}

    const st=pState||{};const tot=Object.values(st).reduce((s,v)=>s+v,0);const cost=Object.entries(st).reduce((s,[n2,cnt])=>s+cnt*(buyable.find(b2=>b2.n===n2)?.pr||0),0);

              <div style={{display:"flex",gap:4,marginTop:8,alignItems:"center"}}>
                <button onClick={()=>setPS({...st,[b2.n]:Math.max(0,cnt-1)})} style={{width:30,height:30,borderRadius:7,border:"1px solid "+BD2,background:CARD,color:INK,cursor:"pointer",fontFamily:bd,fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                <span style={{fontWeight:800,minWidth:18,textAlign:"center",fontSize:16,fontFamily:bd}}>{cnt}</span>
                <button onClick={()=>canMore&&setPS({...st,[b2.n]:cnt+1})} style={{width:30,height:30,borderRadius:7,border:"1px solid "+(canMore?i.bg:BD2),background:canMore?i.bg:CARD,color:canMore?i.tx:BD2,cursor:canMore?"pointer":"default",fontFamily:bd,fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",opacity:canMore?1:0.4}}>+</button>
              </div>
            </div>);
          })}
        </div>
        <div style={{display:"flex",gap:8}}>
          {tot>0 && <button onClick={()=>onAction("buy",st)} style={{...btnP,flex:1}}>Buy {tot} ({$$(cost)})</button>}
          <button onClick={()=>onAction("buy",{})} style={{...btnS,flex:tot>0?0:1}}>{tot>0?"Skip":"End Turn"}</button>
        </div></>
      )}
    </div>);
  }
  return null;
}

// âââââââââââââââ APP âââââââââââââââ
function App(){
  const[game,setGame]=useState(null);
  const[sel,setSel]=useState(null);
  const[ps,setPs]=useState(null);
  const[showLog,setShowLog]=useState(false);
  const aiRef=useRef(null);
  const start=useCallback((players,cards)=>{setGame(newGame(players,Date.now(),cards));setSel(null);setPs(null);},[]);
  const act=useCallback((action,data)=>{
    if(!game)return;let g=game;
    if(action==="restart"){setGame(null);return;}
    if(action==="place"){g=doPlace(g,data);setSel(null);setPs(null);}
    else if(action==="found"){g=doFound(g,data);setPs(null);}
    else if(action==="merger_survivor"){g=doSurv(g,data);}
    else if(action==="dismiss_popup"){if(g.ph==="popup"){const card=g.popup?.card||null;g.cardForMerger=card;const res=appCard(g,card,g.ci2);if(res==="cancel"){g.mq=null;g.popup=null;g.ph="place";g=doEnd(g);}else g=startDec(g);setPs(null);}else if(g.ph==="popup_result")g=advM(g);}
    else if(action==="merger_player_decide"){g=subDec(g,data.idx,data.dec);setPs(null);}
    else if(action==="buy"){const f={};for(const[k,v]of Object.entries(data))if(v>0)f[k]=v;if(Object.keys(f).length>0)g=doBuy(g,f);g=doEnd(g);setPs(null);if(g.over)g=doFinal(g);}
    setGame({...g});
  },[game]);
  useEffect(()=>{
    if(!game||game.over)return;
    if(game.popup&&(game.ph==="popup"||game.ph==="popup_result"))return;
    if(game.ph==="merger_decide"&&game.mdpi!==null){
      const decider=game.ps[game.mdpi];
      if(decider.tp!=="human"){
        aiRef.current=setTimeout(()=>{const dn=game.mq.defunct[game.mq.di];const dnN=typeof dn==="string"?dn:dn.n||dn;const held=decider.sh[dnN]||0;if(held>0){const d=aiMerger(game,decider,dnN,game.mq.surv,held);act("merger_player_decide",{idx:game.mdpi,dec:d});}else{setGame({...subDec(dc(game),game.mdpi,{sell:0,convert:0,hold:0})});}},1000+Math.floor(Math.random()*2700));
        return()=>clearTimeout(aiRef.current);
      }return;
    }
    const p=game.ps[game.ci2];if(p.tp==="human")return;
    aiRef.current=setTimeout(()=>{
      let g=game;
      if(g.ph==="place"){const tile=aiTile(g,g.ci2);if(!tile){g=doEnd(g);setGame({...g});return;}g=doPlace(g,tile);}
      if(g.ph==="found"){const inactive=Object.values(g.cos).filter(c2=>c2.st==="inactive");if(inactive.length)g=doFound(g,inactive[Math.floor(Math.random()*inactive.length)].n);}
      if(g.ph==="merger_survivor"&&g.mq?.tied){const p2=g.ps[g.ci2];const best=g.mq.tied.sort((a,b2)=>(p2.sh[b2]||0)-(p2.sh[a]||0))[0];g=doSurv(g,best);}
      if(g.ph==="buy"){const purchases=aiBuy(g,g.ci2);const f2={};for(const[k,v]of Object.entries(purchases))if(v>0)f2[k]=v;if(Object.keys(f2).length>0)g=doBuy(g,f2);g=doEnd(g);if(g.over)g=doFinal(g);}
      setGame({...g});
    },1000+Math.floor(Math.random()*2700));
    return()=>clearTimeout(aiRef.current);
  },[game,act]);

  if(!game)return <Setup onStart={start}/>;
  const human=game.ps.find(p=>p.tp==="human");
  return (
    <div style={{fontFamily:bd,background:BG,color:INK,minHeight:"100vh",padding:"8px 8px env(safe-area-inset-bottom)",maxWidth:540,margin:"0 auto",boxSizing:"border-box"}}>
      <Popup popup={game.popup} game={game} onDismiss={()=>act("dismiss_popup")}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"10px 4px 8px"}}>
        <div style={{fontFamily:hd,fontSize:20,fontWeight:900,color:INK}}>Buyout</div>
        <div style={{fontSize:11,color:INK3,fontFamily:bd}}>Turn {game.turn+1} Â· {game.pool.length} tiles</div>
      </div>
      <div style={{background:CARD,borderRadius:14,padding:10,marginBottom:6,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",border:"1px solid "+BD}}>
        <Board2 game={game} onTileClick={setSel} sel={sel} human={human}/>
        <HandBar game={game} sel={sel} onSelect={setSel}/>
        <CoBar game={game}/>
      </div>
      <div style={{background:CARD,borderRadius:14,marginBottom:6,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",border:"1px solid "+BD,overflow:"hidden"}}>
        <Actions game={game} onAction={act} sel={sel} pState={ps} setPS={setPs}/>
      </div>
      <div style={{background:CARD,borderRadius:14,padding:10,marginBottom:6,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",border:"1px solid "+BD}}>
        <Holdings game={game}/>
      </div>
      <div style={{background:CARD,borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",border:"1px solid "+BD,overflow:"hidden"}}>
        <GameLog logs={game.logs} show={showLog} onToggle={()=>setShowLog(!showLog)}/>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
